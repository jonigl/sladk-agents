image:
  repository: ghcr.io/rogerdipasquale/sladk-agents
  tag: initial
  pullPolicy: Always
resources:
  limits:
    cpu: 1000m
    memory: 1024M
  requests: 
    cpu: 400m
    memory: 512M
selectorLabels: 
  app: sladk
  env: test
  purpose: ia
labels:
  app: slakd
  purpose: ia
replcaCount: 1
hpaRequired: true
hpa:
  scaleDown:
    policies:
      percentPeriodSeconds: 15
      percentType: Percent
      percentValue: 100
    selectPolicy: Max
    stabilizationWindowSeconds: 300
  scaleUp:
    policies:
      podsPeriodSeconds: 15
      podsType: Pods
      podsValue: 4
      percentPeriodSeconds: 15
      percentType: Percent
      percentValue: 100
    selectPolicy: Max
    stabilizationWindowSeconds: 0
  maxReplicas: 1
  minReplicas: 1
  memory:
    averageUtilization: 90
  cpu:
    averageUtilization: 90
livenessprobe:
  failureThreshold: 3
  httpGet:
    path: /status
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 120
  periodSeconds: 20
  successThreshold: 1
  timeoutSeconds: 10
startupprobe:
  failureThreshold: 3
  httpGet:
    path: /v2/rules
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 5
  periodSeconds: 30
  successThreshold: 1
  timeoutSeconds: 60
secretRef: sladk-secrets

